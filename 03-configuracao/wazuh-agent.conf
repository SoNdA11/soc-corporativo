<!--
  Configuracao do Agente Wazuh para Opcao 5 (Docker)
  Local: /var/ossec/etc/ossec.conf (no host Arch Linux)

  O agente monitora o proprio host onde o Docker roda.
  O Wazuh Manager esta em um container Docker.
-->

<ossec_config>
  <client>
    <server>
      <address>127.0.0.1</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>linux, arch</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ============================================================ -->
  <!-- COLETA DE LOGS LOCAIS                                        -->
  <!-- ============================================================ -->

  <!-- Journal Bridge (logs do systemd em Arch) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/soc-corporativo/soc-journal.log</location>
  </localfile>

  <!-- Log de backup -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/backup.log</location>
  </localfile>

  <!-- Log de restore -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/restore.log</location>
  </localfile>

  <!-- ============================================================ -->
  <!-- FIM (File Integrity Monitoring) - EM TEMPO REAL               -->
  <!-- ============================================================ -->

  <syscheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- Arquivos críticos do sistema -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/sudoers</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/crontab</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/hosts</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/hostname</directories>

    <!-- Dados críticos de clientes (LGPD) -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/data/clientes</directories>

    <!-- Repositório de backup -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/backup-repo</directories>

    <!-- Home do usuário -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/home</directories>

    <!-- Logs de backup -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/var/log/backup.log</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/var/log/restore.log</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/var/log/btmp</ignore>
    <ignore>/var/log/wtmp</ignore>

    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
  </syscheck>

  <!-- ============================================================ -->
  <!-- ROOTCHECK                                                     -->
  <!-- ============================================================ -->

  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>3600</frequency>
    <rootkit_files>/var/ossec/etc/rootcheck/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <!-- ============================================================ -->
  <!-- ACTIVE RESPONSE — Bloqueio automatico de IPs suspeitos       -->
  <!-- ============================================================ -->

  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>200040,200009,200012</rules_id>
    <timeout>600</timeout>
  </active-response>

  <active-response>
    <disabled>no</disabled>
    <command>host-deny</command>
    <location>local</location>
    <rules_id>200040</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>host-deny</name>
    <executable>host-deny</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- ============================================================ -->
  <!-- VULNERABILITY DETECTOR                                       -->
  <!-- ============================================================ -->

  <vulnerability-detector>
    <disabled>no</disabled>
    <interval>5m</interval>
    <run_on_start>yes</run_on_start>

    <provider name="canonical" os="trusty">
      <enabled>no</enabled>
    </provider>

    <provider name="canonical" os="xenial">
      <enabled>no</enabled>
    </provider>

    <provider name="canonical" os="bionic">
      <enabled>no</enabled>
    </provider>

    <provider name="canonical" os="focal">
      <enabled>no</enabled>
    </provider>

    <provider name="arch">
      <enabled>yes</enabled>
      <update_interval>1h</update_interval>
    </provider>

    <provider name="redhat" os="9">
      <enabled>no</enabled>
    </provider>

    <provider name="debian" os="bullseye">
      <enabled>no</enabled>
    </provider>

    <provider name="debian" os="bookworm">
      <enabled>no</enabled>
    </provider>

    <provider name="msu">
      <enabled>no</enabled>
    </provider>

    <provider name="nvd">
      <enabled>yes</enabled>
      <update_from_year>2016</update_from_year>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

</ossec_config>
